<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotto Master Pro 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7c3aed">
    <style>
        :root { --primary: #a78bfa; --danger: #fda4af; --success: #86efac; --dark: #4b5563; --bg: #f5f3ff; }
        body { font-family: sans-serif; background: var(--bg); padding: 10px; margin: 0; color: var(--dark); }
        .card { background: white; padding: 15px; border-radius: 20px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(167, 139, 250, 0.1); border: 1px solid #ede9fe; }
        h3 { margin: 0 0 12px 0; font-size: 15px; color: #7c3aed; display: flex; align-items: center; justify-content: space-between; }
        input, select { width: 100%; padding: 12px; border: 2px solid #f3e8ff; border-radius: 12px; box-sizing: border-box; font-size: 15px; margin-bottom: 8px; outline: none; }
        button { padding: 12px 8px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .btn-primary { background: var(--primary); }
        .btn-dark { background: #94a3b8; }
        .btn-success { background: var(--success); color: #065f46; }
        .btn-warning { background: #fbcfe8; color: #9d174d; }
        .btn-line { background: #06c755; }
        .btn-print { background: #6366f1; }
        .btn-reject { background: #f43f5e; }
        .btn-del { background: var(--danger); padding: 4px 8px; font-size: 11px; color: #9f1239; border-radius: 8px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; }
        .action-right { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; background: white; border-radius: 15px; overflow: hidden; font-size: 14px; }
        th { background: #fdf2f8; padding: 10px; color: #be185d; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #f5f3ff; }
        .summary-box { background: #fdf2f8; padding: 12px; border-radius: 15px; margin-top: 10px; border: 1px solid #fbcfe8; }
        .summary-line { display: block; text-align: right; padding: 4px 0; font-weight: bold; font-size: 15px; }
        .bill-link { color: #7c3aed; cursor: pointer; font-weight: bold; text-decoration: none; }
        .text-danger { color: #e11d48; font-weight: bold; }
        .text-success { color: #059669; font-weight: bold; }
        .hidden { display: none !important; }
        @media print { 
            .no-print, .btn-del, .action-right, #settingsArea, input, select, .btn-grid { display: none !important; } 
            .card { box-shadow: none !important; border: none !important; margin: 0; padding: 10px; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="card no-print">
        <h3 onclick="toggleSettings()" style="cursor:pointer">⚙️ ตั้งค่า <span>▼</span></h3>
        <div id="settingsArea" class="hidden">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><small>2 ตัว (บาทละ):</small><input type="number" id="rate2" value="65"></div>
                <div><small>3 ตัว (บาทละ):</small><input type="number" id="rate3" value="500"></div>
            </div>
            <div><small>เพดานสูงสุด (บาท/เลข):</small><input type="number" id="globalLimit" value="750" oninput="renderAll()"></div>
            <div><small>🚫 เลขอั้น (จ่ายครึ่ง เช่น 12,34):</small><input type="text" id="limitNumbers" placeholder="12,34" oninput="renderAll()"></div>
        </div>
    </div>

    <div class="card no-print">
        <h3>📝 จดรายการใหม่</h3>
        <input type="text" id="billName" placeholder="ชื่อลูกค้า">
        <div class="input-row">
            <select id="lottoType" onchange="toggleLottoInputs()">
                <option value="3ตัว">3 ตัว</option>
                <option value="2ตัว">2 ตัว</option>
            </select>
            <input type="number" id="lottoNum" placeholder="เลข" oninput="limitNum(this)">
            <input type="number" id="lottoTop" placeholder="บน">
            <input type="number" id="lottoBottom" placeholder="ล่าง" style="display:none;">
        </div>
        <div class="btn-grid">
            <button onclick="addLotto()" class="btn-primary">เพิ่ม</button>
            <button onclick="editLast()" class="btn-warning">แก้ไข</button>
            <button onclick="clearInputs()" class="btn-dark">ยกเลิก</button>
            <button onclick="finishBill()" class="btn-success">บันทึก</button>
        </div>
    </div>

    <div class="card" id="currentBillCard" style="display:none;">
        <h3>🧾 บิล: <span id="curBillTitle"></span></h3>
        <table>
            <thead><tr><th>เลข</th><th>บน</th><th>ล่าง</th><th class="col-rej">ดีด</th><th class="no-print">ลบ</th></tr></thead>
            <tbody id="billBody"></tbody>
        </table>
        <div class="summary-box" id="billSummaryBox"></div>
        <div class="no-print action-right">
            <button onclick="sendLineCurrent()" class="btn-line">Line</button>
            <button onclick="window.print()" class="btn-print">ปริ้น</button>
            <button onclick="finishBill()" class="btn-dark">ย้อนกลับ</button>
        </div>
    </div>

    <div id="historySection">
        <div class="card">
            <h3>👤 ประวัติลูกค้า</h3>
            <table>
                <thead><tr><th style="text-align:left; padding-left:15px;">ชื่อบิล</th><th style="text-align:right; padding-right:15px;">ยอดสุทธิ</th></tr></thead>
                <tbody id="allBillsBody"></tbody>
            </table>
        </div>

        <div class="card">
            <h3>📊 รายการรวม</h3>
            <table>
                <thead><tr><th>เลข</th><th>บน</th><th>ล่าง</th><th class="col-rej">ดีด</th></tr></thead>
                <tbody id="summaryBody"></tbody>
            </table>
            <div class="summary-box" id="globalSummaryBox"></div>
        </div>

        <div class="card">
            <h3>🚫 รายการดีดออกรวม</h3>
            <table>
                <thead><tr><th>เลข</th><th>ประเภท</th><th>ยอดดีด</th></tr></thead>
                <tbody id="rejectTableBody"></tbody>
            </table>
            <div class="summary-box" id="rejectSummaryBox"></div>
            <div class="no-print action-right">
                <button onclick="sendRejectOnly()" class="btn-reject" style="width: 100%;">ส่งยอดดีดไป Line</button>
            </div>
        </div>

        <div class="card no-print">
            <h3>🏆 ตรวจรางวัล</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 60px; gap: 8px;">
                <input type="number" id="win3T" placeholder="3บน"><input type="number" id="win2T" placeholder="2ตัวบน"><input type="number" id="win2B" placeholder="2ตัวล่าง">
                <button onclick="checkWin()" class="btn-dark">ตรวจ</button>
            </div>
            <div id="winDisplayArea" style="display:none; margin-top: 15px;">
                <table><thead><tr><th>ชื่อลูกค้า</th><th>เลขที่ถูก</th><th>ได้รับ</th></tr></thead><tbody id="winBody"></tbody></table>
            </div>
            <button onclick="clearAll()" style="width:100%; margin-top:20px; background:none; color:#94a3b8; border:1px solid #ccc; font-size:11px;">ล้างข้อมูลทั้งหมด</button>
        </div>
    </div>

<script>
    let entries = JSON.parse(localStorage.getItem('ent_v12')) || [];
    let currentBillEntries = JSON.parse(localStorage.getItem('cur_v12')) || [];
    let billCounter = parseInt(localStorage.getItem('bc_v12')) || 1;

    window.onload = function() {
        if(currentBillEntries.length > 0) { showWorkingMode(true); document.getElementById('curBillTitle').innerText = currentBillEntries[0].bill; renderCurrentBill(); }
        renderAll();
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
    };

    function showWorkingMode(isW) { document.getElementById('currentBillCard').style.display = isW ? 'block' : 'none'; document.getElementById('historySection').style.display = isW ? 'none' : 'block'; }
    function clearInputs() { document.getElementById('lottoNum').value = ''; document.getElementById('lottoTop').value = ''; document.getElementById('lottoBottom').value = ''; document.getElementById('lottoNum').focus(); }
    function toggleSettings() { document.getElementById('settingsArea').classList.toggle('hidden'); }
    function limitNum(el) { let m = document.getElementById('lottoType').value === '3ตัว' ? 3 : 2; if(el.value.length > m) el.value = el.value.slice(0, m); }
    function toggleLottoInputs() { document.getElementById('lottoBottom').style.display = (document.getElementById('lottoType').value === '2ตัว') ? 'block' : 'none'; clearInputs(); }

    function addLotto() {
        const bill = document.getElementById('billName').value; if(!bill) return alert("ระบุชื่อลูกค้า");
        const type = document.getElementById('lottoType').value, num = document.getElementById('lottoNum').value;
        const top = parseInt(document.getElementById('lottoTop').value) || 0, bot = parseInt(document.getElementById('lottoBottom').value) || 0;
        if(!num) return;
        if(top > 0) currentBillEntries.push({ bill, type: (type === '3ตัว' ? '3บน' : 'บน'), num, amt: top, ts: Date.now() });
        if(bot > 0 && type === '2ตัว') currentBillEntries.push({ bill, type: 'ล่าง', num, amt: bot, ts: Date.now() });
        localStorage.setItem('cur_v12', JSON.stringify(currentBillEntries));
        showWorkingMode(true); document.getElementById('curBillTitle').innerText = bill; renderCurrentBill(); clearInputs();
    }

    function sendLineCurrent() { 
        let billName = document.getElementById('curBillTitle').innerText;
        let message = `🧾 บิลหวย: ${billName}\n------------------\n`;
        document.querySelectorAll("#billBody tr").forEach(tr => {
            let num = tr.cells[0].innerText;
            if(tr.cells[1].innerText !== '-' && tr.cells[1].innerText !== '0') message += `• ${num} ${num.length === 3 ? '[ตรง]' : '[บน]'} = ${tr.cells[1].innerText} บ.\n`;
            if(tr.cells[2].innerText !== '-' && tr.cells[2].innerText !== '0') message += `• ${num} [ล่าง] = ${tr.cells[2].innerText} บ.\n`;
        });
        let totalVal = document.getElementById('billSummaryBox').innerText.match(/ยอดรับสุทธิ: ([\d,]+)/)?.[1] || '0';
        message += `------------------\n💰 ยอดรวม: ${totalVal} บาท`;
        window.location.href = `line://msg/text/${encodeURIComponent(message)}`; 
    }

    function renderCurrentBill() {
        const body = document.getElementById('billBody'); body.innerHTML = '';
        const r2 = parseInt(document.getElementById('rate2').value)||0, r3 = parseInt(document.getElementById('rate3').value)||0;
        const w3 = document.getElementById('win3T').value, w2t = document.getElementById('win2T').value, w2b = document.getElementById('win2B').value;
        const limits = document.getElementById('limitNumbers').value.split(',').map(s => s.trim());
        let total = 0, totalWin = 0, limit = parseInt(document.getElementById('globalLimit').value) || 750;
        let track = {}, grouped = {};
        currentBillEntries.forEach(item => {
            if(!grouped[item.num]) grouped[item.num] = { top:0, bot:0, rej:0 };
            let k = item.num + item.type;
            if(!track[k]) track[k] = entries.filter(e => e.num === item.num && e.type === item.type).reduce((s, e) => s + e.amt, 0);
            let acc = Math.max(0, Math.min(item.amt, limit - track[k]));
            if(item.type==='ล่าง') grouped[item.num].bot += acc; else grouped[item.num].top += acc;
            grouped[item.num].rej += (item.amt - acc); total += acc; track[k] += item.amt;
            let rate = limits.includes(item.num) ? 0.5 : 1;
            if(item.type==='3บน'&&item.num===w3) totalWin += (acc * r3 * rate);
            else if((item.type==='บน'&&item.num===w2t) || (item.type==='ล่าง'&&item.num===w2b)) totalWin += (acc * r2 * rate);
        });
        for(let n in grouped) {
            let isW = (n === w3 || n === w2t || n === w2b);
            body.innerHTML += `<tr class="${isW ? 'text-danger' : ''}"><td><b>${n}</b></td><td>${grouped[n].top||'-'}</td><td>${grouped[n].bot||'-'}</td><td class="col-rej">${grouped[n].rej||'-'}</td><td class="no-print"><button class="btn-del" onclick="removeFromCurrent('${n}')">✕</button></td></tr>`;
        }
        document.getElementById('billSummaryBox').innerHTML = `<div class="summary-line">ยอดรับสุทธิ: ${total.toLocaleString()} บ.</div><div class="summary-line text-success">ยอดถูกรางวัล: ${totalWin.toLocaleString()} บ.</div><div class="summary-line text-danger">คงเหลือ: ${(total - totalWin).toLocaleString()} บ.</div>`;
    }

    function renderAll() {
        localStorage.setItem('ent_v12', JSON.stringify(entries));
        const limit = parseInt(document.getElementById('globalLimit').value) || 750;
        const r2 = parseInt(document.getElementById('rate2').value)||0, r3 = parseInt(document.getElementById('rate3').value)||0;
        const w3 = document.getElementById('win3T').value, w2t = document.getElementById('win2T').value, w2b = document.getElementById('win2B').value;
        const limits = document.getElementById('limitNumbers').value.split(',').map(s => s.trim());
        const billsBody = document.getElementById('allBillsBody'); billsBody.innerHTML = '';
        let billsData = {};
        entries.forEach(e => {
            if(!billsData[e.bill]) billsData[e.bill] = { total: 0 };
            let accTrack = entries.slice(0, entries.indexOf(e)).filter(x => x.num === e.num && x.type === e.type).reduce((s, x) => s + x.amt, 0);
            billsData[e.bill].total += Math.max(0, Math.min(e.amt, limit - accTrack));
        });
        for(let name in billsData) billsBody.innerHTML += `<tr><td style="padding-left:15px;"><span class="bill-link" onclick="editByName('${name}')">👤 ${name}</span></td><td style="text-align:right; padding-right:15px;"><b>${billsData[name].total.toLocaleString()}</b></td></tr>`;
        const sumBody = document.getElementById('summaryBody'); sumBody.innerHTML = '';
        const rejBody = document.getElementById('rejectTableBody'); rejBody.innerHTML = '';
        let globalTrack = {}, totalAcc = 0, totalGlobalWin = 0, totalRej = 0;
        entries.forEach(e => {
            if(!globalTrack[e.num]) globalTrack[e.num] = { top:0, bot:0, rTop:0, rBot:0, sTop:0, sBot:0 };
            let curSum = (e.type === 'ล่าง') ? globalTrack[e.num].sBot : globalTrack[e.num].sTop;
            let acc = Math.max(0, Math.min(e.amt, limit - curSum));
            let rej = e.amt - acc;
            if(e.type === 'ล่าง') { globalTrack[e.num].bot += acc; globalTrack[e.num].sBot += e.amt; globalTrack[e.num].rBot += rej; } 
            else { globalTrack[e.num].top += acc; globalTrack[e.num].sTop += e.amt; globalTrack[e.num].rTop += rej; }
            totalAcc += acc; totalRej += rej;
            let rate = limits.includes(e.num) ? 0.5 : 1;
            if(e.type==='3บน'&&e.num===w3) totalGlobalWin += (acc * r3 * rate);
            else if((e.type==='บน'&&e.num===w2t) || (e.type==='ล่าง'&&e.num===w2b)) totalGlobalWin += (acc * r2 * rate);
        });
        for(let n in globalTrack) {
            let isW = (n === w3 || n === w2t || n === w2b);
            sumBody.innerHTML += `<tr class="${isW ? 'text-danger' : ''}"><td><b>${n}</b></td><td>${globalTrack[n].top||'-'}</td><td>${globalTrack[n].bot||'-'}</td><td class="col-rej">${(globalTrack[n].rTop + globalTrack[n].rBot)||'-'}</td></tr>`;
            if(globalTrack[n].rTop > 0) rejBody.innerHTML += `<tr><td>${n}</td><td>บน</td><td class="text-danger">${globalTrack[n].rTop}</td></tr>`;
            if(globalTrack[n].rBot > 0) rejBody.innerHTML += `<tr><td>${n}</td><td>ล่าง</td><td class="text-danger">${globalTrack[n].rBot}</td></tr>`;
        }
        document.getElementById('globalSummaryBox').innerHTML = `<div class="summary-line">ยอดรับรวม: ${totalAcc.toLocaleString()} บ.</div><div class="summary-line text-success">ยอดถูกรวม: ${totalGlobalWin.toLocaleString()} บ.</div><div class="summary-line text-danger">คงเหลือรวม: ${(totalAcc - totalGlobalWin).toLocaleString()} บ.</div>`;
        document.getElementById('rejectSummaryBox').innerHTML = `<div class="summary-line text-danger">ยอดดีดออกรวมทั้งหมด: ${totalRej.toLocaleString()} บ.</div>`;
    }

    function checkWin() {
        const w3 = document.getElementById('win3T').value, w2t = document.getElementById('win2T').value, w2b = document.getElementById('win2B').value;
        const r2 = parseInt(document.getElementById('rate2').value)||0, r3 = parseInt(document.getElementById('rate3').value)||0;
        const limit = parseInt(document.getElementById('globalLimit').value)||750;
        const limits = document.getElementById('limitNumbers').value.split(',').map(s => s.trim());
        const winBody = document.getElementById('winBody'); winBody.innerHTML = '';
        let winGroup = {}, track = {};
        entries.forEach(e => {
            let k = e.num + e.type; if(!track[k]) track[k] = 0;
            let acc = Math.max(0, Math.min(e.amt, limit - track[k]));
            track[k] += e.amt;
            let winAmt = 0;
            if(e.type==='3บน'&&e.num===w3) winAmt = acc * r3;
            else if(e.type==='บน'&&e.num===w2t || e.type==='ล่าง'&&e.num===w2b) winAmt = acc * r2;
            if(winAmt > 0) {
                if(limits.includes(e.num)) winAmt /= 2;
                if(!winGroup[e.bill]) winGroup[e.bill] = [];
                winGroup[e.bill].push({ n: e.num, t: e.type, a: winAmt });
            }
        });
        for(let name in winGroup) {
            let sum = winGroup[name].reduce((s,v)=>s+v.a,0);
            winBody.innerHTML += `<tr><td><span class="bill-link" onclick="editByName('${name}')">👤 ${name}</span></td><td class="text-danger">${winGroup[name].map(x=>x.n+'('+x.t+')').join(', ')}</td><td class="text-success">${sum.toLocaleString()}</td></tr>`;
        }
        document.getElementById('winDisplayArea').style.display = Object.keys(winGroup).length ? 'block' : 'none';
        renderAll();
    }

    function editByName(name) { document.getElementById('billName').value = name; currentBillEntries = entries.filter(e => e.bill === name); entries = entries.filter(e => e.bill !== name); showWorkingMode(true); document.getElementById('curBillTitle').innerText = name; renderCurrentBill(); renderAll(); }
    function finishBill() { if(!currentBillEntries.length) { showWorkingMode(false); return; } currentBillEntries.forEach(e => e.id = "b_"+billCounter); entries = [...entries, ...currentBillEntries]; currentBillEntries = []; billCounter++; localStorage.setItem('cur_v12', '[]'); localStorage.setItem('bc_v12', billCounter); showWorkingMode(false); document.getElementById('billName').value = ''; renderAll(); }
    function removeFromCurrent(n) { currentBillEntries = currentBillEntries.filter(e => e.num !== n); if(!currentBillEntries.length) showWorkingMode(false); else renderCurrentBill(); }
    function editLast() { if(!currentBillEntries.length) return; let l = currentBillEntries.pop(); document.getElementById('lottoNum').value = l.num; document.getElementById('lottoTop').value = l.amt; renderCurrentBill(); }
    function clearAll() { if(confirm("ล้างข้อมูลทั้งหมด?")) { localStorage.clear(); location.reload(); } }
    function sendRejectOnly() { let m = `🚫 ยอดดีดออกทั้งหมด\n━━━━━━\n`; document.querySelectorAll("#rejectTableBody tr").forEach(tr => { m += `❌ ${tr.cells[0].innerText} (${tr.cells[1].innerText}): ${tr.cells[2].innerText} บ.\n`; }); window.location.href = `line://msg/text/${encodeURIComponent(m + document.getElementById('rejectSummaryBox').innerText)}`; }
</script>
</body>
</html>
